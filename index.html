<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <title>PGN Study PRO · Coordinador</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-title">
        <h1>PGN Study <span class="pro-badge">PRO</span></h1>
        <p class="header-subtitle">Coordinador · Concurso de Méritos</p>
      </div>
      <div class="header-actions">
        <button id="installBtn" class="install-btn" style="display:none" title="Instalar app">📲 Instalar</button>
        <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema">🌓</button>
      </div>
    </div>
    <div class="global-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="global-progress-bar" id="globalProgressBar"></div>
      <span class="global-progress-text" id="globalProgressText">0% completado</span>
    </div>
  </header>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="main-content">
    <!-- Banner "Continuar escuchando" -->
    <section id="continueBanner" class="continue-banner hidden" aria-live="polite">
      <div class="continue-info">
        <span class="continue-icon">🎧</span>
        <div>
          <p class="continue-label">Continuar escuchando</p>
          <p id="continueTitle" class="continue-title"></p>
          <div class="continue-progress-bar">
            <div id="continueProgressFill" class="continue-progress-fill"></div>
          </div>
        </div>
      </div>
      <button id="continuePlayBtn" class="btn-play-small" aria-label="Reproducir último episodio">▶️</button>
    </section>

    <!-- Pestañas de categoría -->
    <nav class="category-tabs" role="tablist" aria-label="Filtrar por categoría">
      <button class="cat-tab active" data-category="todos" role="tab" aria-selected="true">Todos</button>
      <button class="cat-tab" data-category="comunes" role="tab" aria-selected="false">📚 Comunes</button>
      <button class="cat-tab" data-category="especificos" role="tab" aria-selected="false">🎯 Específicos</button>
      <button class="cat-tab" data-category="comportamental" role="tab" aria-selected="false">🧠 Comportamental</button>
    </nav>

    <!-- Lista de episodios -->
    <section id="episodesList" class="episodes-list" role="list"></section>
    <div id="emptyState" class="empty-state hidden">
      <span class="empty-icon">📭</span>
      <p>No hay episodios en esta categoría</p>
    </div>
  </main>

  <!-- ==================== MINI PLAYER ==================== -->
  <aside id="miniPlayer" class="mini-player hidden" aria-label="Reproductor mini">
    <button class="mini-player-trigger" id="miniPlayerTrigger">
      <div class="mini-artwork" id="miniArtwork">🎙️</div>
      <div class="mini-info">
        <p id="miniTitle" class="mini-title"></p>
        <div class="mini-progress-bar">
          <div id="miniProgressFill" class="mini-progress-fill"></div>
        </div>
      </div>
    </button>
    <button id="miniPlayBtn" class="btn-play-mini" aria-label="Reproducir o pausar">▶️</button>
  </aside>

  <!-- ==================== PLAYER EXPANDIDO ==================== -->
  <section id="expandedPlayer" class="expanded-player hidden" aria-label="Reproductor expandido" role="dialog">
    <div class="player-backdrop"></div>
    <div class="player-content">
      <button id="collapsePlayer" class="btn-collapse" aria-label="Minimizar reproductor">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
      <div class="artwork-container">
        <div id="artworkRing1" class="artwork-ring ring-1"></div>
        <div id="artworkRing2" class="artwork-ring ring-2"></div>
        <div id="artworkRing3" class="artwork-ring ring-3"></div>
        <div id="artworkEmoji" class="artwork-emoji">🎙️</div>
      </div>
      <div class="wave-bars" id="waveBars">
        <span class="bar bar-1"></span><span class="bar bar-2"></span><span class="bar bar-3"></span>
        <span class="bar bar-4"></span><span class="bar bar-5"></span><span class="bar bar-6"></span>
        <span class="bar bar-7"></span>
      </div>
      <div class="player-episode-info">
        <h2 id="playerTitle">Selecciona un episodio</h2>
        <p id="playerSubtitle"></p>
      </div>
      <div class="player-progress-container">
        <span id="currentTime" class="time-label">00:00</span>
        <div id="progressBarContainer" class="progress-bar-scrub" role="slider" aria-label="Progreso" tabindex="0"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progressBarFill" class="progress-bar-fill"></div>
          <div id="progressThumb" class="progress-thumb"></div>
        </div>
        <span id="totalTime" class="time-label">00:00</span>
      </div>
      <div class="player-controls">
        <button id="speedBtn" class="control-btn">1×</button>
        <button id="rewindBtn" class="control-btn" aria-label="Retroceder 10s">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
        </button>
        <button id="playPauseBtn" class="control-btn btn-play-lg" aria-label="Reproducir">
          <svg id="playIcon" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="forwardBtn" class="control-btn" aria-label="Adelantar 10s">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
        </button>
        <button id="sleepTimerBtn" class="control-btn" aria-label="Temporizador">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </button>
      </div>
      <div id="sleepOptions" class="sleep-options hidden">
        <button class="sleep-option" data-minutes="15">15 min</button>
        <button class="sleep-option" data-minutes="30">30 min</button>
        <button class="sleep-option" data-minutes="45">45 min</button>
        <button class="sleep-option" data-minutes="60">1 hora</button>
        <button class="sleep-option sleep-cancel" data-minutes="0">Cancelar</button>
      </div>
    </div>
  </section>

  <!-- ==================== BANNER PRO ==================== -->
  <div id="proBanner" class="pro-banner">
    <div class="pro-banner__body">
      <span class="pro-banner__icon">🚀</span>
      <div class="pro-banner__text">
        <strong>¿Ya sabes a qué cargo vas?</strong>
        <span>Contenido PRO adaptado a tu convocatoria exacta</span>
      </div>
    </div>
    <a id="proWhatsAppBtn" class="pro-banner__cta" href="https://t.me/TU_USUARIO" target="_blank" rel="noopener">Ver PRO</a>
    <button id="proCloseBtn" class="pro-banner__close" aria-label="Cerrar">×</button>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.error('Error SW:', err));
      });
    }
  </script>
</body>
</html>

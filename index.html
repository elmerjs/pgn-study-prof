<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Podcasts educativos para el concurso de méritos de la Procuraduría General de la Nación" />
  <meta name="theme-color" content="#0b1020" />
  <title>PGN Study — Concurso de Méritos</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="8" fill="url(#grad1)"/>
            <path d="M7 14a7 7 0 1 0 14 0A7 7 0 0 0 7 14zm7-4v4l3 2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2563eb"/>
                <stop offset="1" stop-color="#0ea5e9"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">PGN Study</span>
          <span class="brand-sub">Concurso de Méritos</span>
        </div>
      </div>

      <div class="header-actions">
        <!-- Sleep timer -->
        <div class="sleep-wrapper">
          <button class="icon-btn" id="sleepBtn" aria-label="Sleep timer" title="Sleep timer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span class="sleep-badge" id="sleepBadge" hidden></span>
          </button>
          <div class="sleep-menu" id="sleepMenu" hidden>
            <div class="sleep-menu-header">Sleep timer</div>
            <button class="sleep-option" data-min="15">15 min</button>
            <button class="sleep-option" data-min="30">30 min</button>
            <button class="sleep-option" data-min="45">45 min</button>
            <button class="sleep-option" data-min="60">60 min</button>
            <button class="sleep-option sleep-cancel" id="sleepCancel" hidden>Cancelar</button>
          </div>
        </div>

        <!-- Theme toggle -->
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Cambiar tema">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ════════════════════════════ MAIN CONTENT ════════════════════════════ -->
  <main class="app-main">

    <!-- Continue listening banner -->
    <div class="continue-banner" id="continueBanner" hidden>
      <div class="continue-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        <div>
          <div class="continue-label">Continuar escuchando</div>
          <div class="continue-title" id="continueBannerTitle">—</div>
        </div>
      </div>
      <button class="btn-continue" id="continueBannerBtn">Reanudar</button>
    </div>

    <!-- Global progress -->
    <section class="global-progress-section" aria-label="Progreso global">
      <div class="progress-header">
        <span class="progress-label">Progreso del curso</span>
        <span class="progress-count"><span id="completedCount">0</span> / 8 episodios</span>
      </div>
      <div class="global-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="8" aria-valuenow="0">
        <div class="global-progress-fill" id="globalProgressFill"></div>
      </div>
    </section>

    <!-- Filter tabs -->
    <div class="tabs-wrapper" role="tablist" aria-label="Filtrar episodios">
      <button class="tab active" data-filter="todos" role="tab" aria-selected="true">Todos</button>
      <button class="tab" data-filter="estrategia" role="tab" aria-selected="false">Estrategia</button>
      <button class="tab" data-filter="estructura" role="tab" aria-selected="false">Estructura</button>
      <button class="tab" data-filter="funcional" role="tab" aria-selected="false">Funcional</button>
    </div>

    <!-- Episodes list -->
    <section class="episodes-section" aria-label="Lista de episodios">
      <div class="episodes-list" id="episodesList" role="list">
        <!-- Injected by JS -->
      </div>
    </section>

  </main>

  <!-- ════════════════════════════ FULL PLAYER ════════════════════════════ -->
  <div class="full-player" id="fullPlayer" hidden aria-label="Reproductor completo">
    <button class="player-close" id="playerClose" aria-label="Cerrar reproductor">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    <div class="full-player-inner">
      <div class="full-player-art">
        <div class="art-disc" id="artDisc">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
      </div>

      <div class="full-player-meta">
        <div class="fp-eje" id="fpEje"></div>
        <h2 class="fp-title" id="fpTitle">—</h2>
        <p class="fp-sub" id="fpSub">—</p>
        <p class="fp-foco" id="fpFoco">—</p>
      </div>

      <!-- Seekbar -->
      <div class="seekbar-wrapper">
        <div class="seekbar-container">
          <input type="range" class="seekbar" id="seekbar" min="0" max="100" value="0" aria-label="Posición del audio" />
          <div class="seekbar-fill" id="seekbarFill"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="totalTime">—</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="fp-controls">
        <button class="ctrl-btn skip-btn" id="skipBack" aria-label="Retroceder 15s">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          <span class="skip-label">15</span>
        </button>

        <button class="ctrl-btn play-btn" id="playPauseBtn" aria-label="Play / Pause">
          <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" hidden><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>

        <button class="ctrl-btn skip-btn" id="skipFwd" aria-label="Adelantar 30s">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.51"/>
          </svg>
          <span class="skip-label">30</span>
        </button>
      </div>

      <!-- Speed control -->
      <div class="speed-wrapper">
        <button class="speed-btn" id="speedBtn" aria-label="Velocidad de reproducción">1×</button>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════ MINI PLAYER ═══════════════════════════ -->
  <div class="mini-player" id="miniPlayer" hidden aria-label="Mini reproductor">
    <div class="mini-left" id="miniLeft">
      <div class="mini-disc">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="mini-meta">
        <div class="mini-title" id="miniTitle">—</div>
        <div class="mini-sub" id="miniSub">—</div>
      </div>
    </div>
    <div class="mini-right">
      <button class="mini-btn" id="miniPlay" aria-label="Play / Pause">
        <svg class="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" hidden><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
    </div>
    <div class="mini-progress-bar">
      <div class="mini-progress-fill" id="miniProgressFill"></div>
    </div>
  </div>

  <!-- Hidden audio element -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="./script.js"></script>
</body>
</html>
